<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aprender Jugando 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --minecraft-grass: #7cb342;
    --minecraft-dirt: #8b7355;
    --minecraft-stone: #7f8287;
    --minecraft-cobble: #696b6d;
    --minecraft-wood: #8b6f47;
    --minecraft-oak-log: #6b5d4f;
    --minecraft-planks: #c19a6b;
    --minecraft-gold: #ffd700;
    --minecraft-emerald: #50c878;
    --minecraft-blue: #4a90e2;
    --minecraft-red: #e74c3c;
    --minecraft-dark: #1a1a1a;
    --minecraft-light: #ffffff;
    --sea:#3b7dc9; --sea2:#2d5aa4;
    --grass:var(--minecraft-grass); --grass2:#6fa030;
    --sand:#e6cf8f; --path:#b0814e; --path2:#9a6f40;
    --snow:#dfe9f2; --snow2:#c3d4e4;
    --rock:var(--minecraft-stone);
    --wood:var(--minecraft-wood); --wood2:var(--minecraft-oak-log);
    --cream:#f5ecd6; --gold:var(--minecraft-gold); --leaf:var(--minecraft-emerald);
    --danger:var(--minecraft-red); --hp:var(--minecraft-red); --hpbg:#3d1f1f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#16110b;
    color:var(--cream);
    font-family:'Nunito',system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:12px;
    -webkit-tap-highlight-color:transparent;
  }
  .pixel{font-family:'Press Start 2P',monospace;line-height:1.6;letter-spacing:.5px}

  #game{
    width:100%; max-width:560px;
    background:var(--minecraft-dark);
    border:6px solid var(--minecraft-dark);
    border-radius:0;
    box-shadow:0 0 0 3px var(--minecraft-stone),0 0 0 6px var(--minecraft-dark),0 18px 40px rgba(0,0,0,.8);
    overflow:hidden;
    position:relative;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }

  /* ---------- HUD ---------- */
  #hud{
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; background:var(--minecraft-stone);
    border-bottom:4px solid var(--minecraft-dark);
    border-top:2px solid var(--minecraft-cobble);
    flex-wrap:wrap;
  }
  #hud .title{font-size:11px; color:var(--minecraft-gold); margin-right:auto; text-shadow:2px 2px 0 rgba(0,0,0,.5)}
  #hud .island{font-size:10px; color:var(--minecraft-emerald); width:100%; order:5; opacity:1; text-shadow:1px 1px 0 rgba(0,0,0,.3)}
  .stat{display:flex; align-items:center; gap:4px; font-size:10px; font-weight:800; text-shadow:1px 1px 0 rgba(0,0,0,.3)}
  .stat .ico{font-size:14px}
  .hpbar{width:80px; height:10px; background:var(--minecraft-dark); border:3px solid var(--minecraft-dark); border-radius:0; overflow:hidden; box-shadow:inset 0 0 0 1px var(--minecraft-cobble)}
  .hpbar > i{display:block; height:100%; background:var(--minecraft-red); transition:width .3s; box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)}

  /* ---------- World (3D) ---------- */
  #worldWrap{position:relative; background:var(--minecraft-blue); overflow:hidden;
    height:56vh; max-height:440px; min-height:280px; border-bottom:2px solid var(--minecraft-stone)}
  #world{position:absolute; inset:0}
  #world canvas{display:block; width:100%; height:100%; touch-action:none}
  /* mira / crosshair POV */
  #crosshair{position:absolute; left:50%; top:50%; width:18px; height:18px;
    transform:translate(-50%,-50%); pointer-events:none; z-index:4; opacity:.55}
  #crosshair::before,#crosshair::after{content:""; position:absolute; background:#fff;
    box-shadow:0 0 2px rgba(0,0,0,.7)}
  #crosshair::before{left:50%; top:0; width:2px; height:100%; transform:translateX(-50%)}
  #crosshair::after{top:50%; left:0; height:2px; width:100%; transform:translateY(-50%)}
  #lookHint{position:absolute; left:50%; bottom:8px; transform:translateX(-50%);
    background:rgba(8,5,2,.55); color:var(--cream); font-size:11px; font-weight:800;
    padding:4px 10px; border-radius:8px; z-index:4; pointer-events:none;
    transition:opacity .4s}

  /* ---------- Controls ---------- */
  #controls{display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; background:var(--minecraft-stone); border-top:4px solid var(--minecraft-dark); border-bottom:2px solid var(--minecraft-cobble); gap:10px}
  .dpad{display:grid; grid-template-columns:repeat(3,38px); grid-template-rows:repeat(3,38px); gap:3px}
  .dpad button{grid-column:2; background:var(--minecraft-stone); color:var(--minecraft-light);
    border:4px solid; border-color:var(--minecraft-cobble) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-cobble); border-radius:0; font-size:16px; cursor:pointer; user-select:none; font-weight:800; box-shadow:inset -2px -2px 0 rgba(0,0,0,.3)}
  .dpad .left{grid-column:1; grid-row:2}
  .dpad .up{grid-row:1}
  .dpad .down{grid-row:3}
  .dpad .right{grid-column:3; grid-row:2}
  .dpad button.held,.dpad button:active{background:var(--minecraft-grass); color:var(--minecraft-dark); box-shadow:inset 2px 2px 0 rgba(0,0,0,.2)}
  .ctrl-right{display:flex; flex-direction:column; gap:6px}
  .btn{font-family:'Press Start 2P',monospace; font-weight:800; cursor:pointer;
    border:4px solid; border-color:var(--minecraft-cobble) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-cobble); border-radius:0; padding:8px 10px; font-size:10px;
    background:var(--minecraft-emerald); color:var(--minecraft-dark); box-shadow:inset -2px -2px 0 rgba(0,0,0,.3)}
  .btn.gold{background:var(--minecraft-gold); color:var(--minecraft-dark)}
  .btn.ghost{background:var(--minecraft-oak-log); color:var(--minecraft-light)}
  .btn.danger{background:var(--minecraft-red); color:var(--minecraft-light)}
  .btn:active{transform:translateY(2px); box-shadow:inset 1px 1px 0 rgba(0,0,0,.3)}
  .btn:disabled{opacity:.4; cursor:not-allowed}
  .hint-key{font-size:9px; opacity:.8; text-align:center; color:var(--minecraft-light)}

  /* ---------- Modal ---------- */
  #overlay{position:absolute; inset:0; background:rgba(0,0,0,.85);
    display:none; align-items:center; justify-content:center; padding:16px; z-index:20}
  #overlay.show{display:flex}
  .panel{width:100%; max-width:420px; background:var(--minecraft-oak-log);
    border:8px solid; border-color:var(--minecraft-planks) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-planks); border-radius:0; padding:16px;
    box-shadow:0 12px 30px rgba(0,0,0,.8); animation:pop .18s ease;
    max-height:90%; overflow:auto}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .panel h2{font-size:12px; color:var(--minecraft-gold); margin-bottom:10px; display:flex; align-items:center; gap:8px; text-shadow:2px 2px 0 rgba(0,0,0,.5)}
  .speaker{display:flex; gap:8px; align-items:flex-start; margin-bottom:12px}
  .speaker .face{font-size:32px}
  .bubble{background:var(--minecraft-light); border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0;
    padding:10px 12px; font-size:13px; line-height:1.4; flex:1; color:var(--minecraft-dark)}
  .bubble b{color:var(--minecraft-gold)}
  .wordbig{font-family:'Press Start 2P',monospace; font-size:16px; color:var(--minecraft-emerald);
    text-align:center; margin:6px 0 14px; text-shadow:2px 2px 0 rgba(0,0,0,.3)}
  .choices{display:grid; gap:6px}
  .choice{font-family:'Press Start 2P',monospace; font-weight:800; font-size:10px; text-align:left;
    background:var(--minecraft-light); color:var(--minecraft-dark); border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0;
    padding:10px 12px; cursor:pointer; box-shadow:inset -2px -2px 0 rgba(0,0,0,.2)}
  .choice:hover{background:var(--minecraft-cobble); color:var(--minecraft-light)}
  .choice.correct{background:var(--minecraft-emerald); color:var(--minecraft-dark); box-shadow:inset -2px -2px 0 rgba(0,0,0,.3)}
  .choice.wrong{background:var(--minecraft-red); color:var(--minecraft-light); box-shadow:inset -2px -2px 0 rgba(0,0,0,.3)}
  .choice:disabled{cursor:default}
  .feedback{margin-top:12px; font-size:13px; font-weight:800; min-height:20px; color:var(--minecraft-light)}
  .feedback.good{color:var(--minecraft-emerald)}
  .feedback.bad{color:var(--minecraft-red)}
  .panel-actions{display:flex; gap:8px; margin-top:14px; justify-content:flex-end; flex-wrap:wrap}

  /* shop */
  .shop-item{display:flex; align-items:center; gap:8px; background:var(--minecraft-planks);
    border:4px solid; border-color:var(--minecraft-wood) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-wood); border-radius:0; padding:10px; margin-bottom:8px; box-shadow:inset -2px -2px 0 rgba(0,0,0,.2)}
  .shop-item .si-ico{font-size:24px}
  .shop-item .si-name{font-weight:800; font-size:12px; color:var(--minecraft-dark)}
  .shop-item .si-desc{font-size:11px; opacity:.75; color:var(--minecraft-dark)}
  .shop-item .si-buy{margin-left:auto; text-align:right}
  .price{font-size:11px; font-weight:800; color:var(--minecraft-gold); margin-bottom:4px}
  .owned{font-size:10px; color:var(--minecraft-emerald); font-weight:800}

  /* word bank */
  .wb-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:46vh; overflow:auto; margin-top:4px}
  .wb-card{background:var(--minecraft-light); color:var(--minecraft-dark); border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone);
    border-radius:0; padding:8px 10px; box-shadow:inset -1px -1px 0 rgba(0,0,0,.2)}
  .wb-en{font-family:'Press Start 2P',monospace; font-size:9px; color:var(--minecraft-dark); opacity:.7}
  .wb-es{font-size:12px; font-weight:800; margin-top:3px; color:var(--minecraft-dark)}
  .wb-mast{margin-top:5px; font-size:11px; color:var(--minecraft-dark)}
  .wb-card.rusty{background:var(--minecraft-gold); border-color:var(--minecraft-gold) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-gold)}
  .wb-rusty-tag{font-size:9px; color:var(--minecraft-red); font-weight:800}
  .empty{opacity:.5; font-size:12px; text-align:center; padding:18px; color:var(--minecraft-light)}
  .wb-sub{font-size:11px; opacity:.85; margin:8px 0 4px; color:var(--minecraft-emerald); font-weight:800}

  /* medals / achievements */
  #hud .stat.clickable{cursor:pointer}
  #objective{
    display:flex; align-items:center; gap:6px;
    padding:8px 10px; background:var(--minecraft-cobble); border-bottom:4px solid var(--minecraft-dark);
    font-size:11px; font-weight:800; color:var(--minecraft-light)}
  #objective .ob-ico{font-size:16px}
  #objective .ob-text b{color:var(--minecraft-gold)}
  #objective .ob-prog{margin-left:auto; font-size:10px; color:var(--minecraft-emerald); white-space:nowrap}
  .medal-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:52vh; overflow:auto; margin-top:6px}
  .medal-card{display:flex; gap:8px; align-items:center; background:var(--minecraft-light); color:var(--minecraft-dark);
    border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0; padding:8px 10px; box-shadow:inset -1px -1px 0 rgba(0,0,0,.2)}
  .medal-card.locked{filter:grayscale(1); opacity:.4}
  .medal-card .m-ico{font-size:24px}
  .medal-card .m-name{font-weight:800; font-size:11px}
  .medal-card .m-desc{font-size:10px; opacity:.75}
  .toast.medal{background:var(--minecraft-gold); color:var(--minecraft-dark); border-color:var(--minecraft-dark)}

  /* boss: completar palabras (letras faltantes) */
  .lett-word{display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin:8px 0 12px}
  .lett-shown,.lett-slot{font-family:'Press Start 2P',monospace; font-size:14px;
    width:26px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:0; border:3px solid var(--minecraft-dark)}
  .lett-shown{color:var(--minecraft-emerald)}
  .lett-slot{background:var(--minecraft-oak-log); border:3px dashed var(--minecraft-gold); color:var(--minecraft-light)}
  .lett-slot.filled{background:var(--minecraft-light); color:var(--minecraft-dark); border-style:solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone)}
  .lett-pool{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin:6px 0 2px}
  .lett-btn{font-family:'Press Start 2P',monospace; font-size:11px; min-width:36px; padding:8px 6px;
    background:var(--minecraft-light); color:var(--minecraft-dark); border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0; cursor:pointer; box-shadow:inset -1px -1px 0 rgba(0,0,0,.2)}
  .lett-btn:hover{background:var(--minecraft-cobble); color:var(--minecraft-light)}
  .lett-btn:active{transform:translateY(2px); box-shadow:inset 1px 1px 0 rgba(0,0,0,.2)}
  .lett-btn:disabled{opacity:.3; cursor:default}

  /* combat (enemies that multiply) */
  .enemy-row{display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin:4px 0 10px}
  .enemy{width:32px;height:32px;border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone);border-radius:0;
    background:var(--minecraft-red);
    display:flex;align-items:center;justify-content:center;font-size:16px; box-shadow:inset -1px -1px 0 rgba(0,0,0,.3)}
  .enemy.dead{background:var(--minecraft-dark); opacity:.3}

  /* boss */
  .bosswrap{text-align:center}
  .boss-face{font-size:44px; margin:4px 0; filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
  .boss-shake{animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .barlabel{font-size:10px; text-align:left; margin:8px 0 3px; color:var(--minecraft-light)}
  .bossbar{height:12px; background:var(--minecraft-dark); border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0; overflow:hidden}
  .bossbar > i{display:block; height:100%; background:var(--minecraft-red); transition:width .35s}
  .selfbar > i{background:var(--minecraft-emerald)}

  /* island travel */
  .isl-item{display:flex; align-items:center; gap:8px; background:var(--minecraft-planks);
    border:4px solid; border-color:var(--minecraft-wood) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-wood); border-radius:0; padding:10px; margin-bottom:8px; box-shadow:inset -2px -2px 0 rgba(0,0,0,.2)}
  .isl-item .ii-ico{font-size:24px}
  .isl-item .ii-name{font-weight:800; font-size:12px; color:var(--minecraft-dark)}
  .isl-item .ii-desc{font-size:11px; opacity:.75; color:var(--minecraft-dark)}
  .isl-item .ii-go{margin-left:auto}
  .locked{opacity:.5}
  .tag{font-size:9px; font-weight:800; color:var(--minecraft-emerald)}
  .tag.lock{color:var(--minecraft-gold)}

  .toast{position:absolute; left:50%; bottom:96px; transform:translateX(-50%);
    background:var(--minecraft-emerald); color:var(--minecraft-dark); font-weight:800; font-size:11px;
    padding:8px 14px; border-radius:0; border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); z-index:30;
    opacity:0; transition:opacity .25s, bottom .25s; pointer-events:none; text-align:center; box-shadow:0 4px 8px rgba(0,0,0,.5)}
  .toast.show{opacity:1; bottom:110px}
  .toast.warn{background:var(--minecraft-gold); color:var(--minecraft-dark)}

  /* perfil del jugador */
  .prof-top{display:flex; gap:12px; align-items:center; margin-bottom:8px}
  .prof-meta{flex:1; min-width:0}
  .prof-name{font-family:'Press Start 2P',monospace; font-size:11px; color:var(--minecraft-gold);
    margin-bottom:8px; word-break:break-word; line-height:1.5}
  .prof-stats{font-size:12px; font-weight:800; margin-bottom:4px; color:var(--minecraft-light)}
  .figure{position:relative; width:116px; height:166px; flex:none;
    background:var(--minecraft-cobble);
    border:4px solid; border-color:var(--minecraft-planks) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-planks); border-radius:0; box-shadow:inset 0 0 0 2px var(--minecraft-dark)}
  .fig-body{position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    font-size:90px; filter:drop-shadow(2px 2px 0 rgba(0,0,0,.6))}
  .fig-item{position:absolute; font-size:24px; line-height:1}
  .fig-item.off{opacity:.15; filter:grayscale(1)}
  .fig-item.on{filter:drop-shadow(1px 1px 0 rgba(0,0,0,.6))}
  .fi-helmet{top:4px;  left:50%; transform:translateX(-50%)}
  .fi-chest {top:60px; left:50%; transform:translateX(-50%)}
  .fi-pants {top:100px;left:50%; transform:translateX(-50%)}
  .fi-boots {bottom:4px;left:50%; transform:translateX(-50%)}
  .fi-shield{top:64px; left:4px}
  .fi-sword {top:64px; right:4px}
  .name-input{width:100%; font-family:'Press Start 2P',monospace; font-weight:800; font-size:11px;
    padding:10px 12px; border:4px solid; border-color:var(--minecraft-stone) var(--minecraft-dark) var(--minecraft-dark) var(--minecraft-stone); border-radius:0;
    background:var(--minecraft-light); color:var(--minecraft-dark); margin:8px 0}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important; transition:none!important}
  }
  @media (max-width:430px){
    .btn{font-size:9px; padding:7px 9px}
    #worldWrap{height:48vh}
    .hint-key{font-size:8px}
  }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <span class="title pixel">APRENDER JUGANDO 3D</span>
    <span class="stat" title="Vida"><span class="ico">❤️</span><span class="hpbar"><i id="hpFill" style="width:100%"></i></span></span>
    <span class="stat" title="Gemas"><span class="ico">💎</span><span id="gemCount">0</span></span>
    <span class="stat" title="Palabras aprendidas"><span class="ico">📖</span><span id="wordCount">0</span></span>
    <span class="stat clickable" id="medalStat" title="Logros desbloqueados"><span class="ico">🏅</span><span id="medalCount">0/0</span></span>
    <span class="island" id="islandName">Isla Niebla</span>
  </div>

  <div id="objective">
    <span class="ob-ico" id="obIco">🎯</span>
    <span class="ob-text" id="obText">Explora la isla</span>
    <span class="ob-prog" id="obProg"></span>
  </div>

  <div id="worldWrap">
    <div id="world"></div>
    <div id="crosshair"></div>
    <div id="lookHint">Arrastra para orbitar · ▲▼ caminar · ◀▶ girar</div>
  </div>

  <div id="controls">
    <div class="dpad">
      <button class="up" data-dir="up" aria-label="Avanzar">▲</button>
      <button class="left" data-dir="left" aria-label="Girar izquierda">◀</button>
      <button class="down" data-dir="down" aria-label="Retroceder">▼</button>
      <button class="right" data-dir="right" aria-label="Girar derecha">▶</button>
    </div>
    <div class="ctrl-right">
      <button class="btn gold" id="actionBtn" disabled>Acércate a alguien</button>
      <button class="btn ghost" id="bankBtn">📖 Mis palabras</button>
      <button class="btn ghost" id="profileBtn">👤 Perfil</button>
      <button class="btn ghost" id="helpBtn">❓ Ayuda</button>
      <div class="hint-key">Avanzar: ▲▼/W,S · Girar: ◀▶/A,D · Mirar: arrastra · Interactúa: E</div>
    </div>
  </div>

  <div id="overlay"><div id="panel" class="panel"></div></div>
  <div id="toast" class="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ======================================================================
   APRENDER JUGANDO — versión 3D POV (primera persona)

   Mismas REGLAS que la versión 2D: exploras una isla, hablas con aldeanos
   que dan PISTAS (no respuestas), lo aprendido es tu moneda y tu arma,
   compras equipo, despejas enemigos y vences al jefe para abrir la
   siguiente isla. La ÚNICA diferencia es la presentación: el mapa de
   tiles ahora se recorre en 3D, en primera persona, con Three.js.

   Toda la lógica de aprendizaje/combate/jefe/tienda/logros se conserva
   intacta; sólo cambian el renderizado del mundo y el movimiento.
   ====================================================================== */

/* ----------------------------------------------------------------------
   DATOS: ISLAS = módulos de aprendizaje (idénticos a la versión 2D)
   ---------------------------------------------------------------------- */
const ISLANDS = [
  {
    id:'niebla',
    name:'Isla Niebla',
    theme:'Inglés · saludos y básicos',
    floor:'G',

/* distractores */
function meaningPool(){
  const local=island().vocab.map(w=>w.es);
  const extra=ALL_VOCAB.map(w=>w.es);
  return [...new Set([...local, ...extra])];
}
function buildChoices(correctEs){
  const others=meaningPool().filter(m=>m!==correctEs);
  const picks=[];
  while(picks.length<3 && others.length){
    const c=others[Math.floor(Math.random()*others.length)];
    if(!picks.includes(c)) picks.push(c);
  }
  const opts=[correctEs,...picks];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  return opts;
}
function learnedHere(){
  return island().vocab.map(w=>w.id).filter(id=>state.learned[id]);
}
function anyLearnedId(){
  const here=learnedHere();
  const pool=here.length?here:Object.keys(state.learned);
  return pool[Math.floor(Math.random()*pool.length)];
}

}

/* lee un color del CSS resolviendo var() anidados (p.ej. --grass:var(--minecraft-grass))
   pintando una sonda oculta y leyendo su color ya computado en rgb(). */
let _cssProbe=null;
function cssColor(name){
  if(!_cssProbe){ _cssProbe=document.createElement('span'); _cssProbe.style.display='none';
    document.body.appendChild(_cssProbe); }
  _cssProbe.style.color='#888888';
  _cssProbe.style.color='var('+name+')';
  const rgb=getComputedStyle(_cssProbe).color;
  return new THREE.Color(rgb||'#888888');
}
const PAL={};
function loadPalette(){
  PAL.G=cssColor('--grass'); PAL.G2=cssColor('--grass2');
  PAL.S=cssColor('--sand');  PAL.P=cssColor('--path');
  PAL.N=cssColor('--snow');  PAL.W=cssColor('--sea'); PAL.W2=cssColor('--sea2');
  PAL.rock=cssColor('--rock');
}

/* textura de un emoji sobre fondo transparente (para sprites POV) */
const _texCache={};
function emojiTexture(ch){
  if(_texCache[ch]) return _texCache[ch];
  const s=128, c=document.createElement('canvas'); c.width=c.height=s;
  const g=c.getContext('2d');
  g.textAlign='center'; g.textBaseline='middle';
  g.font='96px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  g.fillText(ch, s/2, s/2+6);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  _texCache[ch]=t; return t;
}
function setSpriteFace(sprite, ch){
  sprite.material.map=emojiTexture(ch);
  sprite.material.needsUpdate=true;
}

/* ---- sombreado "toon"/cel-shading (look anime) ---- */
function toonGradientTexture(){
  // rampa de pocos escalones -> bandas de luz/sombra propias del anime
  const c=document.createElement('canvas'); c.width=5; c.height=1;
  const g=c.getContext('2d');
  ['#5b5b66','#8f8f9a','#bcbcc4','#e6e6ea','#ffffff'].forEach((col,i)=>{ g.fillStyle=col; g.fillRect(i,0,1,1); });
  const t=new THREE.CanvasTexture(c);
  t.minFilter=t.magFilter=THREE.NearestFilter;
  return t;
}
function toonMat(color){ return new THREE.MeshToonMaterial({color:color, gradientMap:GRAD}); }
/* pieza del personaje = malla toon + contorno negro (back-face escalado) */
function part(geo,color){
  const m=new THREE.Mesh(geo, toonMat(color));
  const o=new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x1c1c22, side:THREE.BackSide}));
  o.scale.setScalar(1.08);
  m.add(o);
  return m;
}
/* extremidad que pivota en su extremo superior (para la animación de caminado) */
function makeLimb(geo,color,pivotY,halfOffset){
  const g=new THREE.Group(); g.position.y=pivotY;
  const m=part(geo,color); m.position.y=halfOffset; g.add(m);
  return g;
}

/* ====================================================================
   ESTÉTICA MINECRAFT: texturas pixeladas, personaje "Steve" y animales
   Todo se genera en <canvas> (sin assets externos) y se filtra con
   NearestFilter para conservar el aspecto de píxel.
   ==================================================================== */
function pixelTexture(size, drawFn){
  const c=document.createElement('canvas'); c.width=c.height=size;
  drawFn(c.getContext('2d'), size);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter; t.minFilter=THREE.NearestFilter;
  return t;
}
/* relleno tipo "ruido" en una rejilla de celdas (bloques Minecraft) */
function noiseTex(shades, cells){
  cells=cells||8;
  return pixelTexture(16,(g,s)=>{
    const cs=s/cells;
    for(let i=0;i<cells;i++)for(let j=0;j<cells;j++){
      g.fillStyle=shades[(Math.random()*shades.length)|0];
      g.fillRect(i*cs,j*cs,Math.ceil(cs),Math.ceil(cs));
    }
  });
}
const MC={
  dirt :['#8b6d4a','#7a5d3e','#96764f','#6e5236','#82613f'],
  grass:['#7cb342','#6fa030','#84bd49','#69992e','#76ad3c'],
  sand :['#e6cf8f','#ddc47f','#ecd79a','#d8bd74'],
  snow :['#eef4fb','#ffffff','#d3deea','#e3ecf6'],
  path :['#b0814e','#9a6f40','#a87a48','#8d6238'],
  stone:['#8a8d91','#7f8287','#969a9f','#74777b']
};
let TEX=null;
function buildTextures(){
  if(TEX) return;
  // cara lateral del pasto: tierra con franja verde irregular arriba
  const grassSide=pixelTexture(16,(g,s)=>{
    const cs=s/8;
    for(let i=0;i<8;i++)for(let j=0;j<8;j++){ g.fillStyle=MC.dirt[(Math.random()*MC.dirt.length)|0]; g.fillRect(i*cs,j*cs,cs+1,cs+1); }
    for(let i=0;i<8;i++){
      for(let j=0;j<3;j++){ g.fillStyle=MC.grass[(Math.random()*MC.grass.length)|0]; g.fillRect(i*cs,j*cs,cs+1,cs+1); }
      if(Math.random()<0.5){ g.fillStyle=MC.grass[(Math.random()*MC.grass.length)|0]; g.fillRect(i*cs,3*cs,cs+1,cs+1); }
    }
  });
  const lam=(map)=>new THREE.MeshLambertMaterial({map});
  const grassTop=lam(noiseTex(MC.grass)), dirt=lam(noiseTex(MC.dirt)),
        side=lam(grassSide), sand=lam(noiseTex(MC.sand)),
        snow=lam(noiseTex(MC.snow)), path=lam(noiseTex(MC.path));
  // orden de caras de BoxGeometry: [+x,-x,+y(top),-y(bottom),+z,-z]
  TEX={
    G:[side,side,grassTop,dirt,side,side],
    S:lam(noiseTex(MC.sand)),
    P:lam(noiseTex(MC.path)),
    N:lam(noiseTex(MC.snow)),
    grassTop, dirt, side, sand, snow, path
  };
}

/* malla simple texturizada/colored para piezas cúbicas */
function box(w,h,d,colorOrMat){
  const mat=(colorOrMat instanceof THREE.Material)?colorOrMat:new THREE.MeshLambertMaterial({color:colorOrMat});
  return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
}
/* extremidad cúbica que pivota arriba (brazos/piernas de Steve y patas de animales) */
function boxLimb(w,h,d,colorOrMat,px,pz,topY){
  const g=new THREE.Group(); g.position.set(px,topY,pz);
  const m=box(w,h,d,colorOrMat); m.position.y=-h/2; g.add(m);
  return g;
}

}

function clearGroup(g){ while(g.children.length) g.remove(g.children[0]); }

/* construye (o reconstruye) la isla actual en 3D */
function buildWorld(){
  loadIsland();
  if(!renderer){ loadPalette(); setupThree(); }

  // ambiente segun isla: la "Isla Niebla" tiene niebla densa :)
  const isFoggy = island().id==='niebla';
  scene.background = (isFoggy? cssColor('--sea2') : cssColor('--sea')).clone();
  scene.fog = new THREE.Fog(scene.background.getHex(), isFoggy?5:9, isFoggy?16:26);

  clearGroup(terrainGroup); clearGroup(objGroup); clearGroup(animalGroup);
  waterMeshes.length=0; animals.length=0; for(const k in objMeshes) delete objMeshes[k];

  // mar de fondo (gran plano) bajo todo el mapa
  const seaGeo=new THREE.PlaneGeometry(120,120);
  const seaMat=new THREE.MeshBasicMaterial({color:PAL.W2});
  const seaPlane=new THREE.Mesh(seaGeo,seaMat);
  seaPlane.rotation.x=-Math.PI/2; seaPlane.position.set(COLS/2,-0.55,ROWS/2);
  terrainGroup.add(seaPlane);

  const cube=new THREE.BoxGeometry(1,1,1);
  const waterMat=new THREE.MeshLambertMaterial({color:PAL.W,transparent:true,opacity:.82});

  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=MAP[y][x];
    if(t==='W'){
      // bloque de agua, más bajo, ligeramente animado
      const m=new THREE.Mesh(cube,waterMat);
      m.scale.set(1,0.7,1);
      m.position.set(x,-0.35,y);
      m.userData.base=-0.35; m.userData.ph=(x+y)*0.6;
      terrainGroup.add(m); waterMeshes.push(m);
    }else{
      // bloque de tierra texturizado (pasto/tierra estilo Minecraft).
      // Cara superior fijada en y=0 (centro en -h/2) para caminar sobre y≈0.
      const h = t==='N'?1.15 : t==='S'?0.95 : 1;
      const m=new THREE.Mesh(cube, TEX[t]||TEX.G);  // TEX.G es un array de 6 caras
      m.scale.set(1,h,1);
      m.position.set(x,-h/2,y);
      terrainGroup.add(m);
      // decoración ocasional sobre césped
      if(t==='G' && !objAt(x,y) && ((x*7+y*3)%5===0)) addDecor(x,y);
    }
  }

  buildObjects();
  buildAnimals();

  // posición/orientación inicial del jugador
  pcx = (typeof state.px==='number')? state.px : island().spawn.x;
  pcz = (typeof state.py==='number')? state.py : island().spawn.y;
  if(!walkable(Math.round(pcx),Math.round(pcz))){ pcx=island().spawn.x; pcz=island().spawn.y; }
  yaw = state.yaw||0; pitch=0.34;
  nearestId=null;
  buildPlayer();
  updateCamera();
}

/* avatar "Steve" de Minecraft (cúbico), visto en tercera persona.
   Proporciones tipo Minecraft: cabeza 0.5, torso 0.5x0.75x0.25,
   brazos/piernas 0.25x0.75x0.25. Pies en y=0; el frente mira a -Z. */
function buildPlayer(){
  if(player) scene.remove(player);
  player=new THREE.Group();
  const S=STEVE;

  // ----- piernas (pivotan en la cadera y=0.75) -----
  const ll=boxLimb(0.25,0.75,0.25,S.pants,-0.13,0,0.75);
  const rl=boxLimb(0.25,0.75,0.25,S.pants, 0.13,0,0.75);
  // zapatos
  const shoeL=box(0.26,0.08,0.27,S.shoe); shoeL.position.y=-0.71; ll.add(shoeL);
  const shoeR=box(0.26,0.08,0.27,S.shoe); shoeR.position.y=-0.71; rl.add(shoeR);
  player.add(ll,rl);

  // ----- torso (camiseta cian) -----
  const torso=box(0.5,0.75,0.25,S.shirt); torso.position.y=1.125; player.add(torso);

  // ----- brazos (pivotan en el hombro y=1.5); manga cian + antebrazo piel -----
  function arm(side){
    const g=new THREE.Group(); g.position.set(side*0.375,1.5,0);
    const sleeve=box(0.25,0.28,0.25,S.shirt); sleeve.position.y=-0.14; g.add(sleeve);
    const fore=box(0.25,0.47,0.25,S.arm);     fore.position.y=-0.515; g.add(fore);
    return g;
  }
  const la=arm(-1), ra=arm(1); player.add(la,ra);

  // ----- cabeza (cara al frente -Z) + pelo -----
  const faceMat=new THREE.MeshLambertMaterial({map:steveFaceTexture()});
  const skinMat=new THREE.MeshLambertMaterial({color:S.skin});
  // caras: [+x,-x,+y,-y,+z,-z]  -> la cara va en -z (frente)
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),
    [skinMat,skinMat,skinMat,skinMat,skinMat,faceMat]);
  head.position.y=1.75; player.add(head);
  // pelo: casquete que cubre parte superior, lados y nuca
  const hairMat=new THREE.MeshLambertMaterial({color:S.hair});
  const cap=new THREE.Mesh(new THREE.BoxGeometry(0.54,0.2,0.54),hairMat); cap.position.y=1.95;
  const nape=new THREE.Mesh(new THREE.BoxGeometry(0.54,0.34,0.16),hairMat); nape.position.set(0,1.74,0.21);
  player.add(cap,nape);

  // userData con miembros que se animan al caminar
  player.userData={ll,rl,la,ra};
  player.position.set(pcx,0,pcz);
  player.rotation.y=-yaw;
  scene.add(player);
}

/* ---------- Animales del bioma (mobs cúbicos que deambulan) ---------- */
const ANIMAL_TYPES=[
  {name:'vaca',   body:0x5a4632, head:0x6b5440, legs:0x3a2a1c},
  {name:'cerdo',  body:0xd98c8c, head:0xe09a9a, legs:0xc77b7b},
  {name:'oveja',  body:0xe8e8e8, head:0xd8c9b0, legs:0xb8b0a4},
  {name:'rana',   body:0x6fae46, head:0x6fae46, legs:0x55903a, squat:true},
  {name:'ave',    body:0xd25a7a, head:0xd25a7a, legs:0xe0b03a, tall:true}
];
function makeAnimal(x,y){
  const ty=ANIMAL_TYPES[(Math.random()*ANIMAL_TYPES.length)|0];
  const g=new THREE.Group();
  const legLen = ty.tall?0.42 : ty.squat?0.14 : 0.26;
  const bw=ty.squat?0.42:0.5, bh=ty.squat?0.22:0.3, bd=ty.squat?0.42:0.3;
  const bodyY=legLen+bh/2;
  // 4 patas (índices: FL, FR, BL, BR) que pivotan arriba
  const legs=[
    boxLimb(0.1,legLen,0.1,ty.legs,-0.15,-0.1,legLen),
    boxLimb(0.1,legLen,0.1,ty.legs, 0.15,-0.1,legLen),
    boxLimb(0.1,legLen,0.1,ty.legs,-0.15, 0.12,legLen),
    boxLimb(0.1,legLen,0.1,ty.legs, 0.15, 0.12,legLen)
  ];
  legs.forEach(l=>g.add(l));
  const bodyMesh=box(bw,bh,bd,ty.body); bodyMesh.position.y=bodyY; g.add(bodyMesh); // cuerpo
  const head=box(0.26,0.26,0.26,ty.head);
  head.position.set(0, bodyY+(ty.tall?0.18:0.06), -(bd/2+0.1)); g.add(head);
  if(ty.name==='ave'){ const beak=box(0.06,0.06,0.14,0xe0b03a); beak.position.set(0,bodyY+0.16,-(bd/2+0.22)); g.add(beak); }
  g.position.set(x,0,y);
  animalGroup.add(g);
  return {group:g, legs, x, z:y, heading:Math.random()*6.28,
          timer:Math.random()*2, moving:true, phase:0, speed:0.6+Math.random()*0.5};
}
function buildAnimals(){
  const n = island().id==='bosque'?6:4;
  let tries=0;
  while(animals.length<n && tries<300){
    tries++;
    const x=1+Math.floor(Math.random()*(COLS-2));
    const y=1+Math.floor(Math.random()*(ROWS-2));
    if(!walkable(x,y) || objAt(x,y)) continue;
    if(Math.abs(x-island().spawn.x)+Math.abs(y-island().spawn.y)<2) continue;
    animals.push(makeAnimal(x,y));
  }
}
function updateAnimals(dt){
  for(const a of animals){
    a.timer-=dt;
    if(a.timer<=0){ a.heading=Math.random()*6.283; a.timer=1.5+Math.random()*2.5; a.moving=Math.random()<0.75; }
    if(a.moving){
      const nx=a.x+Math.sin(a.heading)*a.speed*dt;
      const nz=a.z-Math.cos(a.heading)*a.speed*dt;
      if(walkable(Math.round(nx),Math.round(nz)) && !objAt(Math.round(nx),Math.round(nz))){ a.x=nx; a.z=nz; }
      else { a.heading+=2.3; }
      a.phase+=dt*8;
    } else a.phase*=0.85;
    a.group.position.set(a.x,0,a.z);
    a.group.rotation.y=-a.heading;
    const sw=Math.sin(a.phase)*0.5;
    a.legs[0].rotation.x= sw; a.legs[3].rotation.x= sw;   // diagonal
    a.legs[1].rotation.x=-sw; a.legs[2].rotation.x=-sw;
  }
}

/* ---------- Mobs de Minecraft para los NPCs (aldeanos, slime, creeper) ---------- */

    g.fillStyle='#0a1a0a';
    g.fillRect(1,2,2,2); g.fillRect(5,2,2,2);          // ojos
    g.fillRect(3,4,2,2); g.fillRect(2,6,2,1); g.fillRect(4,6,2,1); // boca
  });
}
/* aldeano: piernas, túnica, brazos al frente, cabeza con nariz grande y uniceja */

/* slime: cubo verde translúcido con cubo interior y cara */
function buildSlime(){

    new THREE.MeshLambertMaterial({color:0x66c24a,transparent:true,opacity:.82}));

/* creeper: 4 patas, cuerpo alto y cabeza con la cara clásica */
function buildCreeper(){
  const g=new THREE.Group();
  const col=0x6cb53f;
  [[-0.13,-0.16],[0.13,-0.16],[-0.13,0.16],[0.13,0.16]].forEach(([x,z])=>{
    const l=box(0.17,0.3,0.17,col); l.position.set(x,0.15,z); g.add(l);
  });
  const body=box(0.5,0.85,0.3,col); body.position.y=0.72; g.add(body);

  head.position.y=1.4; g.add(head);

}
function grayOut(group){
  group.traverse(n=>{ if(n.isMesh){ n.material=n.material.clone();
    if(n.material.color) n.material.color.set(0x9a9a9a);
    n.material.map=null; n.material.transparent=true; n.material.opacity=.6; n.material.needsUpdate=true; }});
}
function buildMob(o, done){
  let g;
  if(o.kind==='teacher')      g=buildVillager(0x7a5a34,0xb78b6b,0x9c7559);
  else if(o.kind==='reviewer')g=buildVillager(0xdfe3e6,0xb78b6b,0x9c7559); // bibliotecario
  else if(o.kind==='shop')    g=buildVillager(0x39414a,0xb78b6b,0x9c7559); // herrero
  else if(o.kind==='enemies') g=buildSlime();
  else if(o.kind==='boss'){   g=buildCreeper(); g.scale.setScalar(1.45); }
  else                        g=buildVillager(0x7a5a34,0xb78b6b,0x9c7559);
  g.position.set(o.x,0,o.y);
  // mirar "hacia adentro" del mapa (su cara está en -Z)
  g.rotation.y = (o.y < ROWS/2) ? Math.PI : 0;
  if(done) grayOut(g);
  return g;
}

function buildObjects(){
  OBJECTS.forEach(o=>{
    const done = (o.kind==='boss'&&state.bossDefeated[island().id]) || (o.kind==='enemies'&&isCleared(o));
    const g=buildMob(o, done);
    g.userData.objId=o.id; g.userData.kind=g.userData.kind||o.kind;
    objGroup.add(g); objMeshes[o.id]=g;
  });
}

/* al despejar/derrotar: el mob se vuelve gris (face se ignora; ya no hay emojis) */
function setObjCleared(o, face){
  const g=objMeshes[o.id]; if(g) grayOut(g);
}

/* ---------- cámara / mirada ---------- */
function updateCamera(){
  // tercera persona "sobre el hombro": la cámara va detrás y un poco a la
  // derecha del personaje, mirando hacia su espalda (como la referencia).
  const fx=Math.sin(yaw), fz=-Math.cos(yaw);   // hacia donde mira el personaje
  const rx=Math.cos(yaw), rz=Math.sin(yaw);    // su derecha
  const hd=CAM_DIST*Math.cos(pitch);           // distancia horizontal
  const vd=CAM_DIST*Math.sin(pitch);           // altura por elevación
  const cx=pcx - fx*hd + rx*CAM_SHOULDER;
  const cz=pcz - fz*hd + rz*CAM_SHOULDER;
  const cy=CAM_HEIGHT + vd;
  camera.position.set(cx, cy, cz);
  camera.lookAt(pcx + rx*CAM_SHOULDER*0.4, CAM_LOOK, pcz + rz*CAM_SHOULDER*0.4);
}
function initLookControls(){
  const el=renderer.domElement;
  let dragging=false, lx=0, ly=0;
  const start=(x,y)=>{dragging=true; lx=x; ly=y; fadeLookHint();};
  const moveLook=(x,y)=>{
    if(!dragging) return;
    const dx=x-lx, dy=y-ly; lx=x; ly=y;
    yaw += dx*0.005;                                   // orbitar/girar al personaje
    pitch = Math.max(0.08, Math.min(0.9, pitch - dy*0.005)); // elevar/bajar la cámara
  };
  const end=()=>{dragging=false; state.yaw=yaw; saveState();};
  el.addEventListener('pointerdown',e=>{el.setPointerCapture(e.pointerId); start(e.clientX,e.clientY);});
  el.addEventListener('pointermove',e=>moveLook(e.clientX,e.clientY));
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}
let _hintFaded=false;
function fadeLookHint(){
  if(_hintFaded) return; _hintFaded=true;
  const h=document.getElementById('lookHint'); if(h) h.style.opacity='0';
}

function onResize(){
  const w=worldEl.clientWidth, h=worldEl.clientHeight;
  if(!w||!h) return;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}

/* ---------- colisión sobre la rejilla ---------- */
const solidCell=(cx,cy)=> !walkable(cx,cy) || !!objAt(cx,cy);
function canStand(x,z){
  const cx=Math.round(x), cz=Math.round(z);
  return !solidCell(cx,cz);
}

/* ---------- bucle principal ---------- */
let _saveAcc=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const overlayShown=overlay.classList.contains('show');
  let moving=false;

  if(!overlayShown){
    // giro
    if(input.l) yaw -= TURN_SPEED*dt;
    if(input.r) yaw += TURN_SPEED*dt;
    // avance/retroceso en el plano (sólo componente horizontal del yaw)
    let mv=0;
    if(input.f) mv+=1;
    if(input.b) mv-=1;
    if(mv!==0){
      const fx=Math.sin(yaw), fz=-Math.cos(yaw);
      const nx=pcx + fx*MOVE_SPEED*dt*mv;
      const nz=pcz + fz*MOVE_SPEED*dt*mv;
      if(canStand(nx,pcz)){ pcx=nx; moving=true; }
      if(canStand(pcx,nz)){ pcz=nz; moving=true; }
    }
    updateCamera();

    // guardado y estado de rejilla
    state.px=pcx; state.py=pcz; state.yaw=yaw;
    _saveAcc+=dt; if(_saveAcc>0.8){ _saveAcc=0; saveState(); }

    // objeto interactuable más cercano
    updateNearest();
    // animales del bioma
    updateAnimals(dt);
  }

  // ---- avatar: orientación, caminado y leve balanceo ----
  if(player){
    player.position.x=pcx; player.position.z=pcz;
    player.rotation.y=-yaw;
    const u=player.userData;
    if(moving) walkPhase += dt*9; else walkPhase *= 0.82;
    const sw=Math.sin(walkPhase)*0.5;
    if(u.ll){
      u.ll.rotation.x= sw;   u.rl.rotation.x=-sw;
      u.la.rotation.x=-sw*0.7; u.ra.rotation.x= sw*0.7;
      player.position.y = Math.abs(Math.sin(walkPhase))*0.05*(moving?1:0);
    }
  }

  // animaciones suaves: agua e idle de los mobs (slime rebota, resto leve)
  const t=clock.elapsedTime;
  for(const m of waterMeshes) m.position.y = m.userData.base + Math.sin(t*1.5+m.userData.ph)*0.04;
  for(const id in objMeshes){
    const g=objMeshes[id];
    if(g.userData.kind==='slime' && g.userData.cube){
      const s=1+Math.sin(t*3+g.position.x)*0.14;
      g.userData.cube.scale.set(1/Math.sqrt(s), s, 1/Math.sqrt(s));
    }else{
      g.position.y = Math.sin(t*1.4+g.position.x)*0.02;
    }
  }

  // anillo pulsante bajo el objetivo cercano
  if(ringMesh.visible){
    const s=1+Math.sin(t*4)*0.12;
    ringMesh.scale.set(s,s,1);
  }

  renderer.render(scene,camera);
}

/* ----------------------------------------------------------------------
   INTERACCIÓN POR CERCANÍA (equivalente 3D de "isAdjacent")
   ---------------------------------------------------------------------- */
function distToObj(o){ return Math.hypot(o.x-pcx, o.y-pcz); }
function nearestInteractable(){
  let best=null, bd=1.7;
  OBJECTS.forEach(o=>{ const d=distToObj(o); if(d<bd){ bd=d; best=o; } });
  return best;
}
function isAdjacent(o){ return distToObj(o)<1.7; }

function updateNearest(){
  const o=nearestInteractable();
  const id=o?o.id:null;
  if(id!==nearestId){
    nearestId=id;
    refreshActionBtn();
    if(o){ ringMesh.visible=true; ringMesh.position.set(o.x,0.12,o.y); }
    else ringMesh.visible=false;
  }
}
function refreshActionBtn(){
  const btn=document.getElementById('actionBtn');
  const o=nearestInteractable();
  if(o){ btn.disabled=false; btn.textContent=labelFor(o);
    ringMesh.visible=true; ringMesh.position.set(o.x,0.12,o.y); }
  else{ btn.disabled=true; btn.textContent='Acércate a alguien'; ringMesh.visible=false; }
}
function labelFor(o){
  if(o.kind==='teacher') return '💬 Hablar con '+o.name.split(' ').slice(1).join(' ');
  if(o.kind==='reviewer') return '🔁 Repasar palabras';
  if(o.kind==='shop') return '🏪 Entrar a la tienda';
  if(o.kind==='enemies') return isCleared(o)?'✅ Zona despejada':'⚔️ Combatir enemigos';
  if(o.kind==='boss') return state.bossDefeated[island().id]?'🚢 Viajar de isla':'⚔️ Enfrentar al jefe';
}

/* ----------------------------------------------------------------------
   LOGROS
   ---------------------------------------------------------------------- */
function recordAnswer(correct){
  if(correct){
    state.stats.totalCorrect++;
    state.stats.correctStreak++;
    if(state.stats.correctStreak>state.stats.bestStreak)
      state.stats.bestStreak=state.stats.correctStreak;
  }else{
    state.stats.correctStreak=0;
  }
  checkMedals();
}
let _medalQueue=[];
function checkMedals(){
  MEDALS.forEach(m=>{
    if(!state.medals[m.id] && m.cond(state, state.stats)) awardMedal(m);
  });
  saveState(); updateHUD();
}
function awardMedal(m){
  state.medals[m.id]=true;
  _medalQueue.push(m);
  if(_medalQueue.length===1) flushMedalToast();
}
function flushMedalToast(){
  const m=_medalQueue[0];
  if(!m) return;
  const t=document.getElementById('toast');
  t.textContent='🏅 ¡Logro: '+m.name+'!';
  t.className='toast show medal';
  clearTimeout(t._t); t._t=setTimeout(()=>{
    t.className='toast medal';
    _medalQueue.shift();
    if(_medalQueue.length) setTimeout(flushMedalToast,300);
  },2200);
}
function openMedals(){
  const got=MEDALS.filter(m=>state.medals[m.id]).length;
  const cards=MEDALS.map(m=>{
    const on=state.medals[m.id];
    return `<div class="medal-card ${on?'':'locked'}">
      <span class="m-ico">${m.ico}</span>
      <div><div class="m-name">${m.name}</div><div class="m-desc">${m.desc}</div></div>
    </div>`;}).join('');
  openPanel(`<h2>🏅 Logros (${got}/${MEDALS.length})</h2>
    <p style="font-size:13px;opacity:.85;margin-bottom:4px">Desbloquea medallas aprendiendo y superando retos. ¡A por todas!</p>
    <div class="medal-grid">${cards}</div>
    <div class="panel-actions"><button class="btn ghost" onclick="closePanel()">Cerrar</button></div>`);
}

/* ----------------------------------------------------------------------
   OBJETIVO
   ---------------------------------------------------------------------- */
function nextObjective(){
  if(state.bossDefeated[island().id])
    return {ico:'🚢', text:'¡Isla liberada! Acércate al muelle y <b>viaja</b> a la siguiente.'};
  const learned=learnedCount();
  if(learned<3)
    return {ico:'💬', text:`Habla con los aldeanos y aprende <b>${3-learned}</b> palabra(s) más.`};
  if(!state.gear.sword)

function combatTurn(){

  let row='';
  for(let i=0;i<combat.total;i++) row+=`<div class="enemy ${i<combat.killed?'dead':''}">${i<combat.killed?'💀':combat.face}</div>`;

    <p style="font-size:12px;opacity:.85;text-align:center;margin-bottom:6px">Quedan ${combat.total-combat.killed}. Cada respuesta correcta derrota a uno.</p>
    <div class="enemy-row">${row}</div>
    <div class="bossbar selfbar" style="margin-bottom:10px"><i style="width:${state.hp/state.maxHp*100}%"></i></div>
    <div class="speaker"><div class="face">${combat.face}</div>
    <div class="bubble">¡Atácalos! ¿Qué significa esta palabra?</div></div>
    <div class="wordbig">${w.en}</div>
    <div class="choices">${opts.map(op=>`<button class="choice" data-v="${op}">${op}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`);
  panel.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>resolveCombat(btn,id,w.es)));
}
function damageTaken(){
  let d=16;
  if(state.gear.chest)  d-=6;
  if(state.gear.shield) d-=5;
  if(state.gear.helmet) d-=4;
  if(state.gear.pants)  d-=3;
  if(state.gear.boots)  d-=2;
  return Math.max(2,d);
}
function resolveCombat(btn,id,correct){
  const right=btn.dataset.v===correct;
  panel.querySelectorAll('.choice').forEach(b=>{b.disabled=true;
    if(b.dataset.v===correct)b.classList.add('correct'); else if(b===btn)b.classList.add('wrong');});
  const fb=document.getElementById('fb');
  if(right){
    combat.killed++; state.learned[id].mastery=Math.min(3,state.learned[id].mastery+1);
    recordAnswer(true);
    fb.className='feedback good'; fb.textContent='¡Golpe certero! Enemigo derrotado.';
  }else{
    const dmg=damageTaken(); state.hp=Math.max(0,state.hp-dmg);
    state.learned[id].mastery=Math.max(1,state.learned[id].mastery-1); recordAnswer(false); updateHUD();
    fb.className='feedback bad'; fb.textContent=`Fallaste — te golpean (-${dmg} ❤️). Era “${correct}”.`;
  }
  saveState();
  setTimeout(()=>{
    if(state.hp<=0){ defeated('Los enemigos te superaron.'); return; }
    if(combat.killed>=combat.total) combatWin();
    else addAction(`<button class="btn" onclick="combatTurn()">Siguiente</button>`);
  },650);
}
function combatWin(){
  const reward=6+state.islandIndex*3;
  state.gems+=reward; state.cleared[clearedKey(combat.obj)]=true;
  state.stats.zonesCleared++; checkMedals(); updateHUD(); saveState();
  setObjCleared(combat.obj);
  openPanel(`<h2>🎉 ¡Zona despejada!</h2>
    <div class="speaker"><div class="face">${combat.face}</div>
    <div class="bubble">Derrotaste a ${combat.total} enemigos usando lo que aprendiste. Recompensa: <b>+${reward} 💎</b>.</div></div>
    <div class="panel-actions"><button class="btn" onclick="closePanel()">¡Genial!</button></div>`);
}

/* ---------- Jefe: completar 5 palabras con letras faltantes ---------- */
let bossFight=null;
const ALPHA='abcdefghijklmnopqrstuvwxyz';
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickBossWords(){
  let pool=island().vocab.filter(w=>state.learned[w.id]);
  if(pool.length<5){
    const extra=ALL_VOCAB.filter(w=>state.learned[w.id] && !pool.includes(w));
    pool=pool.concat(extra);
  }
  pool=pool.slice().sort((a,b)=>a.en.length-b.en.length);
  const picks=[];
  for(let i=0;i<5;i++) picks.push(pool[i<pool.length?i:pool.length-1]);
  return picks;
}
function makeLetterPool(missing){
  const set=new Set(missing), decoys=[];
  while(decoys.length<4){ const c=ALPHA[Math.floor(Math.random()*26)];
    if(!set.has(c)&&!decoys.includes(c)) decoys.push(c); }
  return shuffle([...new Set(missing), ...decoys]);
}
function startBoss(o){
  if(!state.gear.sword){
    openPanel(`<h2>${o.face} ${o.name}</h2>
      <div class="speaker"><div class="face">${o.face}</div>
      <div class="bubble">${o.greeting}<br><br><b>Te falta una espada.</b> Consíguela en la tienda con tus gemas.</div></div>
      <div class="panel-actions"><button class="btn ghost" onclick="closePanel()">Volver</button></div>`);
    return;
  }
  if(Object.keys(state.learned).length<3){
    openPanel(`<h2>${o.face} ${o.name}</h2>
      <div class="speaker"><div class="face">${o.face}</div>
      <div class="bubble">Aprende al menos <b>3 palabras</b> con los aldeanos antes de enfrentarme.</div></div>
      <div class="panel-actions"><button class="btn ghost" onclick="closePanel()">Volver</button></div>`);
    return;
  }
  state.hp=state.maxHp; updateHUD();
  bossFight={o, idx:0, words:pickBossWords()};
  bossWord();
}
function bossWord(){
  const bf=bossFight; if(!bf) return;
  if(bf.idx>=5){ winBoss(bf.o); return; }
  const word=bf.words[bf.idx].en.toLowerCase();
  const hide=Math.min(bf.idx+1, word.length);
  const idxs=shuffle([...Array(word.length).keys()]).slice(0,hide).sort((a,b)=>a-b);
  bf.word=word; bf.es=bf.words[bf.idx].es; bf.positions=idxs;
  bf.slots=new Array(hide).fill(null);
  bf.pool=makeLetterPool(idxs.map(p=>word[p]));
  bf.feedback=null; bf.done=false;
  bossRender();
}
function bossRender(){
  const bf=bossFight, o=bf.o, word=bf.word;
  let disp='', k=0;
  for(let i=0;i<word.length;i++){
    if(bf.positions.includes(i)){
      const f=bf.slots[k++];
      disp+=`<span class="lett-slot ${f?'filled':''}">${f?f.toUpperCase():''}</span>`;
    }else disp+=`<span class="lett-shown">${word[i].toUpperCase()}</span>`;
  }
  const pool=bf.pool.map(l=>`<button class="lett-btn" data-l="${l}" ${bf.done?'disabled':''}>${l.toUpperCase()}</button>`).join('');
  const fb=bf.feedback?`<div class="feedback ${bf.feedback.cls}">${bf.feedback.text}</div>`:`<div class="feedback"></div>`;
  let actions;
  if(bf.done){
    actions=`<button class="btn gold" id="nextWord">${bf.idx>=5?'🏆 ¡Vencer al jefe!':'Siguiente palabra ▶'}</button>`;
  }else{
    actions=`<button class="btn ghost" id="bossDel">⌫ Borrar</button>
             <button class="btn ghost" onclick="closePanel()">Huir</button>`;
  }
  openPanel(`<div class="bosswrap">
      <div class="boss-face" id="bossFace">${o.face}</div>
      <div class="barlabel">${o.name} — Palabra ${Math.min(bf.idx+1,5)}/5</div>
      <div class="bossbar selfbar" style="margin-top:2px"><i id="selfHp" style="width:${state.hp/state.maxHp*100}%"></i></div>
    </div>
    <p style="margin:12px 0 4px;font-weight:800;text-align:center">Completa la palabra · faltan <b>${bf.positions.length}</b> letra(s)<br>
      <span style="font-weight:600;opacity:.85">Pista: significa <b>“${bf.es}”</b></span></p>
    <div class="lett-word">${disp}</div>
    <div class="lett-pool">${pool}</div>
    ${fb}
    <div class="panel-actions">${actions}</div>`);
  panel.querySelectorAll('.lett-btn').forEach(b=>b.addEventListener('click',()=>bossFill(b.dataset.l)));
  const del=panel.querySelector('#bossDel'); if(del) del.onclick=bossClear;
  const nb=panel.querySelector('#nextWord');
  if(nb) nb.onclick = bf.idx>=5 ? ()=>winBoss(bf.o) : ()=>bossWord();
  if(bf.feedback&&bf.feedback.cls==='good'){ const f=document.getElementById('bossFace'); if(f) f.classList.add('boss-shake'); }
}
function bossFill(l){
  const bf=bossFight; if(!bf||bf.done) return;
  const k=bf.slots.findIndex(s=>s===null);
  if(k===-1) return;
  bf.slots[k]=l;
  if(bf.slots.every(s=>s!==null)) bossCheck();
  else bossRender();
}
function bossClear(){
  const bf=bossFight; if(!bf) return;
  for(let k=bf.slots.length-1;k>=0;k--){ if(bf.slots[k]!==null){ bf.slots[k]=null; break; } }
  bossRender();
}
function bossCheck(){
  const bf=bossFight, word=bf.word;
  const ok=bf.positions.every((p,k)=>bf.slots[k]===word[p]);
  if(ok){
    recordAnswer(true); bf.idx++; bf.done=true; saveState();
    bf.feedback={cls:'good', text: bf.idx>=5?'¡Última palabra completada! 🎉':'¡Palabra completada! 🎉'};
    bossRender();
  }else{
    recordAnswer(false);
    const dmg=damageTaken(); state.hp=Math.max(0,state.hp-dmg);
    updateHUD(); saveState();
    if(state.hp<=0){ defeated('El jefe te superó esta vez. ¡Equípate mejor y vuelve!'); return; }
    bf.slots=new Array(bf.positions.length).fill(null);
    bf.feedback={cls:'bad', text:`Esas letras no eran… (-${dmg} ❤️). Mira la pista y reintenta.`};
    bossRender();
  }
}
function winBoss(o){
  state.bossDefeated[island().id]=true; state.gems+=10;
  const next=ISLANDS[state.islandIndex+1];
  if(next) state.unlocked[next.id]=true;
  checkMedals(); updateHUD(); saveState();
  setObjCleared(o, o.face2);
  openPanel(`<h2>🎉 ¡${island().name} liberada!</h2>
    <div class="speaker"><div class="face">🌅</div>
    <div class="bubble">Venciste a <b>${o.name}</b> usando lo que aprendiste. Recompensa: <b>+10 💎</b>.<br><br>
    ${next?`Se desbloqueó una nueva isla: <b>${next.name}</b> (${next.theme}). Acércate al muelle del jefe y pulsa <b>🚢 Viajar</b>.`
          :`¡Has completado todos los módulos disponibles por ahora! Vuelve cuando se sumen nuevas islas. 🏆`}</div></div>
    <div class="panel-actions">${next?`<button class="btn gold" onclick="openTravel()">🚢 Viajar ahora</button>`:''}
      <button class="btn ghost" onclick="closePanel()">Cerrar</button></div>`);
}
function defeated(msg){
  state.hp=state.maxHp; updateHUD(); saveState();
  openPanel(`<h2>💫 Te recuperas</h2>
    <div class="speaker"><div class="face">😵</div>

function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function openProfile(){
  const g=state.gear;
  const it=(key,ico,cls)=>`<span class="fig-item ${cls} ${g[key]?'on':'off'}">${ico}</span>`;
  const figure=`<div class="figure">
      <span class="fig-body">🧍</span>
      ${it('helmet','🪖','fi-helmet')}
      ${it('chest','🦺','fi-chest')}
      ${it('pants','👖','fi-pants')}
      ${it('boots','🥾','fi-boots')}
      ${it('shield','🛡️','fi-shield')}
      ${it('sword','🗡️','fi-sword')}
    </div>`;
  const owned=SHOP.filter(s=>state.gear[s.key]).length;
  const items=SHOP.map(s=>`<div class="shop-item">
      <span class="si-ico">${s.ico}</span>
      <div><div class="si-name">${s.name}</div><div class="si-desc">${s.desc}</div></div>
      <div class="si-buy">${state.gear[s.key]
        ?'<span class="owned">✔ Equipado</span>'
        :'<span class="tag lock">Por conseguir</span>'}</div>
    </div>`).join('');
  const got=MEDALS.filter(m=>state.medals[m.id]).length;
  openPanel(`<h2>👤 Perfil</h2>
    <div class="prof-top">
      ${figure}
      <div class="prof-meta">
        <div class="prof-name">${escapeHtml(state.name)}</div>
        <div class="prof-stats">💎 ${state.gems} &nbsp; 📖 ${learnedCount()} palabras</div>
        <div class="prof-stats">🏅 ${got}/${MEDALS.length} logros</div>
        <div class="prof-stats">🛡️ Equipo: ${owned}/${SHOP.length}</div>
        <button class="btn ghost" id="editNameBtn">✏️ Editar nombre</button>
      </div>
    </div>
    <div class="wb-sub">Tu equipo (lo que vistes en la figura)</div>
    ${items}
    <div class="panel-actions"><button class="btn ghost" onclick="closePanel()">Cerrar</button></div>`);
  const en=panel.querySelector('#editNameBtn'); if(en) en.onclick=editName;
}
function editName(){
  openPanel(`<h2>✏️ Editar nombre</h2>
    <div class="speaker"><div class="face">👤</div>
    <div class="bubble">¿Cómo quieres que te llamen, aventurero/a?</div></div>
    <input id="nameInput" class="name-input" maxlength="16" value="${escapeHtml(state.name)}" />
    <div class="feedback" id="fb"></div>
    <div class="panel-actions">
      <button class="btn ghost" onclick="openProfile()">Cancelar</button>
      <button class="btn gold" id="saveName">Guardar</button>
    </div>`);
  const inp=panel.querySelector('#nameInput'); inp.focus(); inp.select();
  panel.querySelector('#saveName').onclick=()=>{
    const v=inp.value.trim();
    if(!v){ const f=document.getElementById('fb'); f.className='feedback bad'; f.textContent='Escribe un nombre.'; return; }
    state.name=v.slice(0,16); saveState(); toast('✅ Nombre actualizado'); openProfile();
  };
}
function openBank(){
  const ids=Object.keys(state.learned);
  const stars=m=>'⭐'.repeat(m)+'·'.repeat(3-m);
  const cards=ids.length? ids.map(id=>{
    const w=byId(id), s=state.learned[id];
    return `<div class="wb-card ${s.rusty?'rusty':''}">
      <div class="wb-en">${w.en}</div><div class="wb-es">${w.es}</div>
      <div class="wb-mast">Dominio: ${stars(s.mastery)}</div>
      ${s.rusty?'<div class="wb-rusty-tag">⚠ por repasar</div>':''}</div>`;}).join('')
    : '<div class="empty">Aún no aprendes palabras.<br>Habla con un aldeano (💬) para empezar.</div>';
  const p=islandProgress();
  openPanel(`<h2>📖 Mis palabras (${ids.length})</h2>
    <p style="font-size:13px;opacity:.85;margin-bottom:6px">Tus palabras son tu moneda y tu fuerza. Más dominio = más daño.</p>
    <div class="wb-sub">${island().name}: ${p.done}/${p.total} aprendidas</div>
    <div class="wb-grid">${cards}</div>
    <div class="panel-actions">
      <button class="btn gold" onclick="openMedals()">🏅 Logros</button>
      <button class="btn ghost" onclick="openTravel()">🚢 Viajar</button>
      <button class="btn danger" onclick="confirmReset()">↺ Reiniciar</button>
      <button class="btn ghost" onclick="closePanel()">Cerrar</button></div>`);
}
function confirmReset(){
  openPanel(`<h2>↺ Reiniciar progreso</h2>
    <div class="speaker"><div class="face">⚠️</div>
    <div class="bubble">Esto borra tus palabras, gemas y equipo. ¿Seguro?</div></div>
    <div class="panel-actions">
      <button class="btn ghost" onclick="openBank()">Cancelar</button>
      <button class="btn danger" onclick="resetGame()">Sí, reiniciar</button></div>`);
}

/* ---------- Teclado / pad ---------- */
window.addEventListener('keydown',e=>{
  if(e.target && /^(input|textarea|select)$/i.test(e.target.tagName)) return;
  const k=e.key.toLowerCase();
  // Atajos dentro de los retos: 1-4 elige opción, letras rellenan al jefe, Enter avanza.
  if(overlay.classList.contains('show')){
    if(/^[a-z]$/.test(k)){
      const lb=[...panel.querySelectorAll('.lett-btn:not(:disabled)')].find(b=>b.dataset.l===k);
      if(lb){ lb.click(); e.preventDefault(); return; }
    }
    if(['1','2','3','4'].includes(k)){
      const choices=panel.querySelectorAll('.choice:not(:disabled)');
      const idx=+k-1; if(choices[idx]){ choices[idx].click(); e.preventDefault(); }
      return;
    }
    if(k==='enter'){
      const act=panel.querySelector('.panel-actions .btn:not(.ghost):not(.danger)')
              || panel.querySelector('.panel-actions .btn');
      if(act){ act.click(); e.preventDefault(); }
      return;
    }
    if(k==='escape') closePanel();
    return;
  }
  // Movimiento 3D POV: ▲▼/W,S avanzan; ◀▶/A,D giran.
  if(['arrowup','w'].includes(k)){ input.f=true; e.preventDefault(); }
  else if(['arrowdown','s'].includes(k)){ input.b=true; e.preventDefault(); }
  else if(['arrowleft','a'].includes(k)){ input.l=true; e.preventDefault(); }
  else if(['arrowright','d'].includes(k)){ input.r=true; e.preventDefault(); }
  else if(k==='e'){const o=nearestInteractable(); if(o) interact(o);}
  else if(k==='m') openTravel();
});
window.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','w'].includes(k)) input.f=false;
  else if(['arrowdown','s'].includes(k)) input.b=false;
  else if(['arrowleft','a'].includes(k)) input.l=false;
  else if(['arrowright','d'].includes(k)) input.r=false;
});
/* d-pad: mantener pulsado mueve/gira (▲▼ avanzar, ◀▶ girar) */
const DIRMAP={up:'f',down:'b',left:'l',right:'r'};
document.querySelectorAll('.dpad button').forEach(b=>{
  const key=DIRMAP[b.dataset.dir];
  const on =e=>{ e.preventDefault(); input[key]=true;  b.classList.add('held');  fadeLookHint(); };
  const off=e=>{ e.preventDefault(); input[key]=false; b.classList.remove('held'); };
  b.addEventListener('pointerdown',on);
  b.addEventListener('pointerup',off);
  b.addEventListener('pointerleave',off);
  b.addEventListener('pointercancel',off);
});

/* ---------- Init ---------- */
function boot(){
  if(typeof THREE==='undefined'){
    worldEl.innerHTML='<div style="padding:24px;text-align:center;font-weight:800">No se pudo cargar el motor 3D (Three.js).<br>Revisa tu conexión a internet y recarga.</div>';
    return;
  }
  buildWorld(); updateHUD(); refreshActionBtn();
  checkMedals();
  if(Object.keys(state.learned).length===0 && state.islandIndex===0) intro();
}
boot();
</script>
